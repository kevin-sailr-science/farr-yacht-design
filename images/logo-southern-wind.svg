<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <rect width="200" height="80" rx="6" fill="#1a2744"/>
  <!-- Circular SW monogram -->
  <circle cx="100" cy="28" r="14" stroke="#ffffff" stroke-width="1.2" fill="none" opacity="0.9"/>
  <text x="100" y="33" text-anchor="middle" font-family="'Jost', system-ui, sans-serif" font-weight="400" font-size="11" fill="#ffffff" letter-spacing="0.06em">SW</text>
  <!-- Wordmark: SOUTHERN light + WIND bold -->
  <text x="100" y="56" text-anchor="middle" font-family="'Jost', system-ui, sans-serif" font-weight="300" font-size="10.5" fill="#ffffff" letter-spacing="0.16em">SOUTHERN<tspan font-weight="600" dx="3">WIND</tspan></text>
  <!-- Tagline -->
  <text x="100" y="69" text-anchor="middle" font-family="'Kumbh Sans', system-ui, sans-serif" font-weight="300" font-size="5.5" fill="#8a9bb5" letter-spacing="0.22em">THE PERFECT BALANCE</text>
