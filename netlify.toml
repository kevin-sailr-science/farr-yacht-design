# netlify.toml
# Farr Yacht Design - Netlify Configuration
# Deploy: farr-deploy-v8.zip -> Netlify drag-and-drop

[build]
  command = "python3 build_site.py"
  publish = "."
  functions = "netlify/functions"

# Node version for functions
[functions]
  node_bundler = "esbuild"
  included_files = ["_data/plan_catalog.json"]

# Required: Stripe npm package bundled with functions
# Run: npm install stripe in the functions directory before deploy
# Or use Netlify's dependency management via package.json at root

# --- Redirects ---

# Stripe webhook endpoint - must be POST only
[[redirects]]
  from = "/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200
  force = true

# Pretty URL for checkout
[[redirects]]
  from = "/checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200
  force = true

# Pretty URL for download
[[redirects]]
  from = "/download"
  to = "/.netlify/functions/get-download"
  status = 200
  force = true

# Inventory API (public, GET only)
[[redirects]]
  from = "/api/inventory"
  to = "/.netlify/functions/get-inventory"
  status = 200
  force = true

# Save inventory API (admin, POST only)
[[redirects]]
  from = "/api/save-inventory"
  to = "/.netlify/functions/save-inventory"
  status = 200
  force = true

# Waitlist API (backup to Netlify Forms)
[[redirects]]
  from = "/api/waitlist"
  to = "/.netlify/functions/join-waitlist"
  status = 200
  force = true

# Catalog API (admin portal — GET/PUT/POST)
[[redirects]]
  from = "/api/catalog"
  to = "/.netlify/functions/edit-catalog"
  status = 200
  force = true

# Image upload API (admin portal — POST)
[[redirects]]
  from = "/api/upload-image"
  to = "/.netlify/functions/upload-image"
  status = 200
  force = true

