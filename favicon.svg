<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a192f"/>
  <!-- Mainsail: tall triangle from keel to masthead -->
  <polygon points="16,4 16,26 7,26" fill="#ffffff"/>
  <!-- Headsail: jib triangle -->
  <polygon points="16,8 16,26 23,26" fill="#4a9eff" opacity="0.9"/>
  <!-- Deck line -->
  <line x1="5" y1="27" x2="27" y2="27" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
</svg>
