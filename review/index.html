// ═══════════════════════════════════════════════════════════════
// Farr Yacht Design — Complete Project Status Package
// Inception → Delivery | 68 Sessions | 39 Sprints | March 2026

const FarrBlue = "#00267F";
const FarrOrange = "#F97700";
const FarrBronze = "#C0A280";
const SITE = "https://farr-designs.sailr.science";

// ── Shared Components ──────────────────────────────────────────

const StatCard = ({ number, label, sub, accent }) => (
  <div style={{
    background: "#fff", borderRadius: 12, padding: "24px 16px",
    textAlign: "center", border: "1px solid #e8ecf2", flex: "1 1 120px", minWidth: 120,

    {sub && <div style={{ fontSize: 11, color: "#8896a8", marginTop: 3 }}>{sub}</div>}
  </div>
);

const Badge = ({ status }) => {
  const c = {
    complete: { bg: "#e6f9ed", text: "#1a7a3a", label: "Complete" },
    live: { bg: "#e6f9ed", text: "#1a7a3a", label: "Live" },
    ready: { bg: "#e8f0fe", text: FarrBlue, label: "Ready" },
    pending: { bg: "#fff4e5", text: "#b45309", label: "Pending" },
    blocked: { bg: "#fee2e2", text: "#b91c1c", label: "Blocked" },
    next: { bg: "#f1f3f7", text: "#6b7280", label: "Next" },
  }[status] || { bg: "#f1f3f7", text: "#6b7280", label: status };
  return (
    <span style={{
      display: "inline-block", padding: "3px 10px", borderRadius: 20,
      fontSize: 11, fontWeight: 600, letterSpacing: "0.03em", background: c.bg, color: c.text,
    }}>{c.label}</span>
  );
};

const Section = ({ title, children, style: s }) => (
  <div style={{ marginBottom: 28, ...s }}>
    <h3 style={{
      fontSize: 12, fontWeight: 700, textTransform: "uppercase",
      letterSpacing: "0.08em", color: FarrBronze, marginBottom: 14,
      paddingBottom: 8, borderBottom: `2px solid ${FarrBronze}33`,

    {children}
  </div>
);

const Row = ({ label, value, status }) => (
  <div style={{
    display: "flex", justifyContent: "space-between", alignItems: "center",
    padding: "9px 0", borderBottom: "1px solid #f0f2f5",

const Card = ({ children, style: s }) => (
  <div style={{
    background: "#fff", borderRadius: 12, padding: 22,

const CalloutBox = ({ color, title, children }) => {

    amber: { bg: "#fff4e5", border: "#fde4c1", title: "#b45309", text: "#92690d" },
    green: { bg: "#e6f9ed", border: "#bbf0cc", title: "#1a7a3a", text: "#166534" },
    blue: { bg: "#e8f0fe", border: "#bdd4fc", title: FarrBlue, text: "#1e40af" },
    red: { bg: "#fee2e2", border: "#fecaca", title: "#b91c1c", text: "#991b1b" },
  }[color] || { bg: "#f1f3f7", border: "#e2e8f0", title: "#374151", text: "#4b5563" };
  return (
    <div style={{
      background: colors.bg, border: `1px solid ${colors.border}`,
      borderRadius: 10, padding: "16px 20px", marginTop: 12,

const SprintRow = ({ id, name, detail }) => (
  <div style={{
    padding: "10px 16px", borderBottom: "1px solid #f0f2f5",
    display: "flex", gap: 12, alignItems: "flex-start",
  }}>
    <span style={{
      fontSize: 11, fontWeight: 700, color: FarrBlue, background: "#e8f0fe",
      padding: "2px 8px", borderRadius: 4, flexShrink: 0, marginTop: 2,
    }}>{id}</span>

      <div style={{ fontSize: 12, color: "#7a8599", marginTop: 2, lineHeight: 1.5 }}>{detail}</div>
    </div>
  </div>
);

const Phase = ({ number, title, subtitle, color, sprints, defaultOpen }) => {
  const [open, setOpen] = useState(defaultOpen || false);
  return (
    <div style={{ marginBottom: 16 }}>
      <div
        onClick={() => setOpen(!open)}
        style={{
          background: color, borderRadius: open ? "12px 12px 0 0" : 12,
          padding: "18px 22px", cursor: "pointer", display: "flex",
          justifyContent: "space-between", alignItems: "center",
          transition: "border-radius 0.15s",
        }}
      >
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.6)", letterSpacing: "0.06em", textTransform: "uppercase" }}>
            Phase {number}

          <div style={{ fontSize: 17, fontWeight: 700, color: "#fff", marginTop: 2 }}>{title}</div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginTop: 4 }}>{subtitle}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <Badge status="complete" />
          <span style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>{open ? "−" : "+"}</span>
        </div>
      </div>
      {open && (
        <div style={{
          background: "#fff", borderRadius: "0 0 12px 12px",
          border: "1px solid #e8ecf2", borderTop: "none",
        }}>
          {sprints.map((s, i) => <SprintRow key={i} {...s} />)}
        </div>
      )}
    </div>
  );
};
