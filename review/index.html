<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farr Yacht Design — Complete Project Status</title>

  <!-- Open Graph / iMessage / SMS preview -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://farr-designs.sailr.science/review/" />
  <meta property="og:title" content="Complete Project Status — 29 Sprints, Inception to Delivery" />
  <meta property="og:description" content="642 designs · 353 images · 29 sprints · WCAG AA · 0 broken links · Ready for launch" />
  <meta property="og:image" content="https://farr-designs.sailr.science/review/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Complete Project Status — 29 Sprints, Inception to Delivery" />
  <meta name="twitter:description" content="642 designs · 353 images · 29 sprints · WCAG AA · 0 broken links · Ready for launch" />
  <meta name="twitter:image" content="https://farr-designs.sailr.science/review/og-image.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f8f9fc; font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
    button { font-family: inherit; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

const FarrBlue = "#00267F";
const FarrOrange = "#F97700";
const FarrBronze = "#C0A280";
const SITE = "https://farr-designs.sailr.science";

const StatCard = ({ number, label, sub, accent }) => (
  <div style={{
    background: "#fff", borderRadius: 12, padding: "24px 16px",
    textAlign: "center", border: "1px solid #e8ecf2", flex: "1 1 120px", minWidth: 120,
  }}>
    <div style={{ fontSize: 36, fontWeight: 800, color: accent || FarrBlue, lineHeight: 1 }}>{number}</div>
    <div style={{ fontSize: 13, fontWeight: 600, color: "#4a5568", marginTop: 6 }}>{label}</div>
    {sub && <div style={{ fontSize: 11, color: "#8896a8", marginTop: 3 }}>{sub}</div>}
  </div>
);

const Badge = ({ status }) => {
  const c = {
    complete: { bg: "#e6f9ed", text: "#1a7a3a", label: "Complete" },
    live: { bg: "#e6f9ed", text: "#1a7a3a", label: "Live" },
    ready: { bg: "#e8f0fe", text: FarrBlue, label: "Ready" },
    pending: { bg: "#fff4e5", text: "#b45309", label: "Pending" },
    blocked: { bg: "#fee2e2", text: "#b91c1c", label: "Blocked" },
    next: { bg: "#f1f3f7", text: "#6b7280", label: "Next" },
  }[status] || { bg: "#f1f3f7", text: "#6b7280", label: status };
  return (
    <span style={{
      display: "inline-block", padding: "3px 10px", borderRadius: 20,
      fontSize: 11, fontWeight: 600, letterSpacing: "0.03em", background: c.bg, color: c.text,
    }}>{c.label}</span>
  );
};

const Section = ({ title, children, style: s }) => (
  <div style={{ marginBottom: 28, ...s }}>
    <h3 style={{
      fontSize: 12, fontWeight: 700, textTransform: "uppercase",
      letterSpacing: "0.08em", color: FarrBronze, marginBottom: 14,
      paddingBottom: 8, borderBottom: "2px solid " + FarrBronze + "33",
    }}>{title}</h3>
    {children}
  </div>
);

const Row = ({ label, value, status }) => (
  <div style={{
    display: "flex", justifyContent: "space-between", alignItems: "center",
    padding: "9px 0", borderBottom: "1px solid #f0f2f5",
  }}>
    <div style={{ flex: 1 }}>
      <span style={{ fontSize: 13, color: "#1a1f2e", fontWeight: 500 }}>{label}</span>
      {value && <span style={{ fontSize: 12, color: "#7a8599", marginLeft: 8 }}>{value}</span>}
    </div>
    {status && <Badge status={status} />}
  </div>
);

const Card = ({ children, style: s }) => (
  <div style={{
    background: "#fff", borderRadius: 12, padding: 22,
    border: "1px solid #e8ecf2", ...s,
  }}>{children}</div>
);

const CalloutBox = ({ color, title, children }) => {
  const colors = {
    amber: { bg: "#fff4e5", border: "#fde4c1", title: "#b45309", text: "#92690d" },
    green: { bg: "#e6f9ed", border: "#bbf0cc", title: "#1a7a3a", text: "#166534" },
    blue: { bg: "#e8f0fe", border: "#bdd4fc", title: FarrBlue, text: "#1e40af" },
    red: { bg: "#fee2e2", border: "#fecaca", title: "#b91c1c", text: "#991b1b" },
  }[color] || { bg: "#f1f3f7", border: "#e2e8f0", title: "#374151", text: "#4b5563" };
  return (
    <div style={{
      background: colors.bg, border: "1px solid " + colors.border,
      borderRadius: 10, padding: "16px 20px", marginTop: 12,
    }}>
      {title && <div style={{ fontSize: 13, fontWeight: 700, color: colors.title, marginBottom: 4 }}>{title}</div>}
      <div style={{ fontSize: 12, color: colors.text, lineHeight: 1.6 }}>{children}</div>
    </div>
  );
};

const TabBtn = ({ active, label, onClick }) => (
  <button onClick={onClick} style={{
    padding: "9px 20px", borderRadius: 8, border: "none", fontSize: 13,
    fontWeight: 600, cursor: "pointer", transition: "all 0.15s ease",
    background: active ? FarrBlue : "#e8ecf2",
    color: active ? "#fff" : "#6b7280",
  }}>{label}</button>
);

// ── OVERVIEW TAB ──

const OverviewTab = () => (
  <>
    <Card style={{ marginBottom: 20 }}>
      <div style={{ fontSize: 16, fontWeight: 700, color: FarrBlue, marginBottom: 10 }}>
        Project Complete — Ready for Launch
      </div>
      <div style={{ fontSize: 13, color: "#4a5568", lineHeight: 1.7 }}>
        The Farr Yacht Design website has been rebuilt from the ground up over 62 sessions and 29
        sprints. Starting from a dated WordPress site with broken links, no search, and stale
        news from 2018, the new site is a fully static, high-performance platform on Netlify with
        642 yacht designs, interactive portfolio search, admin catalog editor, e-commerce with
        Stripe checkout, WCAG 2.1 AA accessibility, and comprehensive SEO. The site is live at
        staging and ready for DNS cutover to farrdesign.com.
      </div>
    </Card>
    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 24 }}>
      <StatCard number="642" label="Designs" sub="563 visible · 79 hidden" />
      <StatCard number="353" label="Images" sub="62% coverage · 64MB optimized" />
      <StatCard number="588" label="Pages" sub="584 in sitemap" />
      <StatCard number="29" label="Sprints" sub="62 sessions" />
      <StatCard number="0" label="Broken Links" sub="25,794 verified" />
    </div>
    <Section title="Deployment">
      <Row label="Platform" value="Netlify — static site, CI/CD auto-deploy" status="live" />
      <Row label="Build system" value="build_site.py generates 563 yacht pages from boats.json" status="live" />
      <Row label="SSL / HTTPS" value="Automatic via Netlify" status="live" />
      <Row label="Admin portal" value="Supabase auth — catalog editor, visibility toggle, owner field" status="live" />
      <Row label="E-commerce" value="Stripe checkout — 7 plans + 9 scanned plan designs" status="live" />
      <Row label="Custom domain" value="farrdesign.com — awaiting DNS switch from WordPress" status="pending" />
      <Row label="GA4 Analytics" value="Placeholder ID — needs GA4 property created" status="pending" />
    </Section>
    <Section title="Quality Certifications">
      <Row label="WCAG 2.1 AA" value="10 accessibility fixes, skip-nav, ARIA labels, contrast" status="complete" />
      <Row label="Content Security Policy" value="CSP headers configured in netlify.toml" status="complete" />
      <Row label="Link integrity" value="588 pages, 25,794 links — zero broken" status="complete" />
      <Row label="Sitemap" value="584 entries (21 static + 563 yachts)" status="complete" />
      <Row label="SEO" value="JSON-LD, Open Graph, meta descriptions on all pages" status="complete" />
      <Row label="Legacy page handling" value="222 MUSE/Drupal files noindexed" status="complete" />
      <Row label="Performance" value="WOFF2 fonts (82% smaller), minified CSS (58.5KB), lazy loading" status="complete" />
      <Row label="Custom error pages" value="Branded 404 and 500 pages" status="complete" />
    </Section>
    <Section title="Brand Assets">
      <Row label="Corporate identity" value="Farr Blue #00267F, Orange #F97700, Bronze #C0A280" status="live" />
      <Row label="Typography" value="Jost, Kumbh Sans, Nunito Sans — WOFF2 self-hosted" status="live" />
      <Row label="Logo" value="SVG + PNG, white variant, favicon" status="live" />
      <Row label="Partner logos" value="6 SVG builder logo cards — Baltic, Cookson, SW, Knierim, Persico, McConaghy" status="live" />
    </Section>
  </>
);

// ── RESEARCH TAB ──

const ResearchTab = () => {
  const [sub, setSub] = useState("audit");
  return (
    <>
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        {[
          { id: "audit", label: "Content Audit" },
          { id: "audiences", label: "Audiences" },
          { id: "competitive", label: "Competitive Analysis" },
        ].map(t => <TabBtn key={t.id} active={sub === t.id} label={t.label} onClick={() => setSub(t.id)} />)}
      </div>
      {sub === "audit" && (
        <>
          <CalloutBox color="blue" title="Executive Summary">
            The legacy Farr Yacht Design website (WordPress + Elementor) contained extensive content
            (90+ yacht designs, 6 service areas) but suffered from news dated 2018, broken internal
            links, no design plan purchase flow, and no search or filtering on the portfolio.
          </CalloutBox>
          <div style={{ marginTop: 20 }} />
          <Section title="Issues Identified">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Card>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#b91c1c", marginBottom: 8 }}>Critical Issues</div>
                <div style={{ fontSize: 12, color: "#4a5568", lineHeight: 1.8 }}>
                  Homepage news dated 2018 · About Us page timeout · Broken internal links ·
                  No design plan purchase flow · No team bios or headshots · Google indexing blocked
                </div>
              </Card>
              <Card>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#b45309", marginBottom: 8 }}>UX Issues</div>
                <div style={{ fontSize: 12, color: "#4a5568", lineHeight: 1.8 }}>
                  No search or filtering on 90+ designs · No contact form (email only) ·
                  Consulting buried, not in nav · Heritage pages orphaned · No mobile optimization
                </div>
              </Card>
            </div>
          </Section>
          <Section title="Content Gaps Identified">
            <Row label="Recent projects" value="No post-2018 content (Kiboko 4, Gelliceaux)" />
            <Row label="Team bios / headshots" value="Critical credibility gap for superyacht buyers" />
            <Row label="Press / media kit" value="No downloadable materials for journalists" />
            <Row label="Design plan purchase flow" value="Key revenue stream — needed Stripe" />
            <Row label="Racing results feed" value="No automated fresh content" />
          </Section>
          <CalloutBox color="green" title="Resolution Status">
            All critical and UX issues have been resolved across Sprints 1–29. See the Journey tab for details.
          </CalloutBox>
        </>
      )}
      {sub === "audiences" && (
        <>
          <Section title="6 Target Audiences">
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
              {[
                { name: "Custom Racing Clients", budget: "$500K–$10M+" },
                { name: "Existing Farr Owners", budget: "Recurring Revenue" },
                { name: "Production Builders", budget: "B2B Partnership" },
                { name: "Racing Teams", budget: "$10K–$100K" },
                { name: "Superyacht Clients", budget: "$5M–$50M+" },
                { name: "Enthusiasts / Press", budget: "Brand Awareness" },
              ].map((a, i) => (
                <Card key={i} style={{ textAlign: "center", padding: 16 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: FarrBlue }}>{a.name}</div>
                  <div style={{ fontSize: 11, color: "#7a8599", marginTop: 4 }}>{a.budget}</div>
                </Card>
              ))}
            </div>
          </Section>
          <Section title="Pain Points Resolved">
            <Row label="No search/filter" value="Sprint 9 — interactive search, sort, filter, grid/list" status="complete" />
            <Row label="No team bios" value="Sprint 8B — Britt's full bio on team page" status="complete" />
            <Row label="No purchase flow" value="Sprint 6 — Stripe checkout end-to-end" status="complete" />
            <Row label="Heritage pages orphaned" value="Sprint 14A — nav integration, racing hub links" status="complete" />
            <Row label="No consulting page" value="Sprint 5 — dedicated consulting page in primary nav" status="complete" />
          </Section>
        </>
      )}
      {sub === "competitive" && (
        <>
          <CalloutBox color="blue" title="Key Insight">
            Owen Clarke Design had superior information architecture, but neither firm had modern UX.
            The Farr rebuild leapfrogs both with interactive portfolio, e-commerce, and static performance.
          </CalloutBox>
          <div style={{ marginTop: 20 }} />
          <Section title="Company Comparison">
            <Row label="Founded" value="Farr: 1981 · Owen Clarke: 1991" />
            <Row label="Positioning" value='Farr: "Designed to Perform" · OCD: "Fast, beautiful sailboats"' />
            <Row label="Key stat" value="Farr: 43 world championships · OCD: 8 Vendee Globe IMOCA 60s" />
          </Section>
          <Section title="Strategic Advantages Achieved">
            <Row label="Racing pedigree" value="43 championships showcased across heritage pages" status="complete" />
            <Row label="Revenue stream" value="Design plan sales via Stripe (7 plans + 9 scanned)" status="complete" />
            <Row label="Modern UX" value="Interactive search, responsive design, lazy loading" status="complete" />
            <Row label="SEO advantage" value="JSON-LD, sitemap, OG tags — OCD has none" status="complete" />
          </Section>
        </>
      )}
    </>
  );
};

// ── JOURNEY TAB ──

const SprintRow = ({ id, name, detail }) => (
  <div style={{
    padding: "10px 16px", borderBottom: "1px solid #f0f2f5",
    display: "flex", gap: 12, alignItems: "flex-start",
  }}>
    <span style={{
      fontSize: 11, fontWeight: 700, color: FarrBlue, background: "#e8f0fe",
      padding: "2px 8px", borderRadius: 4, flexShrink: 0, marginTop: 2,
    }}>{id}</span>
    <div>
      <div style={{ fontSize: 13, fontWeight: 600, color: "#1a1f2e" }}>{name}</div>
      <div style={{ fontSize: 12, color: "#7a8599", marginTop: 2, lineHeight: 1.5 }}>{detail}</div>
    </div>
  </div>
);

const Phase = ({ number, title, subtitle, color, sprints, defaultOpen }) => {
  const [open, setOpen] = useState(defaultOpen || false);
  return (
    <div style={{ marginBottom: 16 }}>
      <div onClick={() => setOpen(!open)} style={{
        background: color, borderRadius: open ? "12px 12px 0 0" : 12,
        padding: "18px 22px", cursor: "pointer", display: "flex",
        justifyContent: "space-between", alignItems: "center",
      }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.6)", letterSpacing: "0.06em", textTransform: "uppercase" }}>
            Phase {number}
          </div>
          <div style={{ fontSize: 17, fontWeight: 700, color: "#fff", marginTop: 2 }}>{title}</div>
          <div style={{ fontSize: 12, color: "rgba(255,255,255,0.7)", marginTop: 4 }}>{subtitle}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <Badge status="complete" />
          <span style={{ color: "#fff", fontSize: 18, fontWeight: 700 }}>{open ? "\u2212" : "+"}</span>
        </div>
      </div>
      {open && (
        <div style={{
          background: "#fff", borderRadius: "0 0 12px 12px",
          border: "1px solid #e8ecf2", borderTop: "none",
        }}>
          {sprints.map((s, i) => <SprintRow key={i} {...s} />)}
        </div>
      )}
    </div>
  );
};

const JourneyTab = () => (
  <>
    <CalloutBox color="blue" title="Full Project Timeline">
      62 sessions across 29 sprints, from initial research through production-ready website.
      Click any phase to expand individual sprint details.
    </CalloutBox>
    <div style={{ marginTop: 20 }} />
    <Phase number="0" title="Research & Strategy" subtitle="Content audit · Competitive analysis · 6 audience personas · Sitemap architecture" color="#64748b"
      sprints={[
        { id: "R1", name: "Content Audit", detail: "Inventoried 120+ pages on legacy WordPress. Identified critical issues: 2018 news, broken links, no purchase flow." },
        { id: "R2", name: "Audience & Journey Mapping", detail: "6 target audiences with conversion goals and user journeys." },
        { id: "R3", name: "Competitive Analysis", detail: "Benchmarked against Owen Clarke Design. Neither had modern UX — opportunity to leapfrog." },
        { id: "R4", name: "Architecture & Wireframes", detail: "Sitemap (20 root + yacht pages), nav structure, wireframes for all key pages." },
      ]} />
    <Phase number="1" title="Foundation" subtitle="Sprints 1–5A · Data import · Three-tier UX · Repo · Netlify · Brand" color="#1e40af"
      sprints={[
        { id: "S1+2", name: "Data Import & Three-Tier UX", detail: "629 designs imported. Three-tier system: Tier 1 (master list), Tier 2 (card/MUSE), Tier 3 (orphan). 605 visible pages." },
        { id: "S3", name: "Export Fix & Gap Analysis", detail: "Fixed data export pipeline. Identified field coverage gaps." },
        { id: "S5A", name: "Repo Restructure & Netlify Pipeline", detail: "CI/CD auto-deploy. Full rebrand to Farr identity: Blue #00267F, Orange, Bronze, WOFF2 brand fonts." },
      ]} />
    <Phase number="2" title="Content & Features" subtitle="Sprints 5B–12 · Admin · E-commerce · Web copy · MUSE data · Portfolio UX · Images" color="#7c3aed"
      sprints={[
        { id: "S5B", name: "Admin Portal / Catalog Editor", detail: "Full catalog editor with Supabase auth. Search, filter, edit, upload images, toggle visibility." },
        { id: "S5C", name: "E-Commerce Unification", detail: "7 design plans unified into purchase flow with collapsible drawing lists." },
        { id: "S6", name: "Stabilize & Ship", detail: "planContents, e-commerce refactor, Stripe checkout tested end-to-end." },
        { id: "S7", name: "MUSE Data Extraction", detail: "14 new designs, 9 descriptions, 26 LOA values from MUSE archive. 643 total." },
        { id: "S8A", name: "Data Cleanup", detail: "Hid 56 designs, fixed 609M duplicate, removed Pat & Jim. 642 total, 563 visible." },
        { id: "S8B", name: "Web Copy Integration", detail: "V3BW doc integrated: team bio, Our Story, awards (15), homepage hero, press kit." },
        { id: "S9", name: "Portfolio UX", detail: "Search, sort, filter by type tags, grid/list toggle. Type tag overlays on thumbnails." },
        { id: "S10", name: "Data Completeness & Image Pipeline", detail: "44 new images, 498 descriptions, 6 LOA values. Coverage 36% \u2192 43%." },
        { id: "S11", name: "Bug Fixes, Kiboko 4, Scanned Plans", detail: "Kiboko 4 corrected. Scanned plans pipeline: 89 PDFs, 6 designs." },
        { id: "S12", name: "MUSE Image Extraction", detail: "38 new images, 17 upgrades. Coverage 43% \u2192 49% (276\u2192314)." },
      ]} />
    <Phase number="3" title="Quality & SEO" subtitle="Sprints 13–18 · SEO · CSS tokens · Image optimization · History corrections" color="#b45309"
      sprints={[
        { id: "S13", name: "SEO, Accessibility & CSS Hardening", detail: "Removed noindex, added sitemap, OG tags, JSON-LD. CSS breakpoints 6\u21922, type scale, spacing tokens." },
        { id: "S14", name: "Portfolio Cards + CSS Phase 2", detail: "Type tag overlays, improved titles, lazy loading, legacy cleanup. Owner field. Design token system." },
        { id: "S15", name: "Image Gap Audit", detail: "41 new images from archives. Coverage 49% \u2192 62% (314\u2192353). Archives exhausted." },
        { id: "S16", name: "CSS Phase 3 — Token Migration", detail: "140 font-size + 219 spacing refs tokenized. 68% coverage." },
        { id: "S17", name: "Image Optimization", detail: "133 images: 140MB \u2192 64MB (54% reduction). Max 1600px wide." },
        { id: "S18", name: "History Page Corrections", detail: "6 inaccuracies fixed against V3BW document. Russell Bowler added as co-founder." },
      ]} />
    <Phase number="4" title="Polish & Hardening" subtitle="Sprints 19–29 · Performance · WCAG AA · Partners · Awards · Logos · Link audit" color="#059669" defaultOpen={true}
      sprints={[
        { id: "S19", name: "Performance", detail: "WOFF2 fonts (82% smaller), CSS minification (58.5KB), font preloading." },
        { id: "S20", name: "CSS Phase 4", detail: "36 migrations, 85% total design token coverage." },
        { id: "S21", name: "Cleanup", detail: "Removed duplicate files from repository." },
        { id: "S22", name: "Accessibility, CSP & Error Pages", detail: "WCAG 2.1 AA (10 fixes), CSP headers, custom 404/500 pages." },
        { id: "S23", name: "CSS Audit", detail: "79 ghost classes removed. 87% utilization." },
        { id: "S24", name: "Partners Page Images", detail: "6 placeholder initials replaced with real boat photos." },
        { id: "S25", name: "Awards Page + Fatigue Audit", detail: "Photo hero, 6-card gallery. 593-image fatigue audit." },
        { id: "S26", name: "Image Attribution Fixes", detail: "Builder photo mismatches corrected. Builder Attribution Rule established." },
        { id: "S27", name: "Cross-Page Fatigue Swaps", detail: "7 swaps across 4 pages. High-fatigue: 9 \u2192 3." },
        { id: "S28", name: "Builder Logos + OG Fix + Link Audit", detail: "6 SVG logos, OG mobile fix, 21 link fixes, 23 redirects." },
        { id: "S29", name: "Link & Sitemap Remediation", detail: "Full crawl: 588 pages, 25,794 links \u2192 0 broken. Sitemap 584 entries. 222 legacy pages noindexed." },
      ]} />
  </>
);

// ── BY THE NUMBERS TAB ──

const MetricRow = ({ label, before, after, improvement }) => (
  <div style={{
    display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr",
    padding: "10px 0", borderBottom: "1px solid #f0f2f5", alignItems: "center",
  }}>
    <div style={{ fontSize: 13, fontWeight: 500, color: "#1a1f2e" }}>{label}</div>
    <div style={{ fontSize: 12, color: "#b91c1c", textAlign: "center" }}>{before}</div>
    <div style={{ fontSize: 12, color: "#1a7a3a", fontWeight: 600, textAlign: "center" }}>{after}</div>
    <div style={{ fontSize: 11, color: FarrBlue, fontWeight: 600, textAlign: "center" }}>{improvement}</div>
  </div>
);

const NumbersTab = () => (
  <>
    <Section title="Before & After">
      <Card>
        <div style={{
          display: "grid", gridTemplateColumns: "2fr 1fr 1fr 1fr",
          padding: "8px 0", borderBottom: "2px solid #e8ecf2", marginBottom: 4,
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase" }}>Metric</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#b91c1c", textAlign: "center", textTransform: "uppercase" }}>Before</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: "#1a7a3a", textAlign: "center", textTransform: "uppercase" }}>After</div>
          <div style={{ fontSize: 11, fontWeight: 700, color: FarrBlue, textAlign: "center", textTransform: "uppercase" }}>Change</div>
        </div>
        <MetricRow label="Yacht designs" before="~90" after="642" improvement="+613%" />
        <MetricRow label="Visible pages" before="~90" after="563" improvement="+526%" />
        <MetricRow label="Images" before="~50" after="353" improvement="+606%" />
        <MetricRow label="Image file size" before="140 MB" after="64 MB" improvement="\u221254%" />
