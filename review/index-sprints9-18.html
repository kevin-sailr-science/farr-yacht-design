  <script type="text/babel">
    const { useState } = React;

    const FarrBlue = "#00267F";
    const FarrOrange = "#F97700";
    const FarrBronze = "#C0A280";

    const StatCard = ({ number, label, sub }) => (
      <div style={{
        background: "#fff", borderRadius: 12, padding: "28px 20px",
        textAlign: "center", border: "1px solid #e8ecf2", flex: "1 1 140px", minWidth: 140,
      }}>

        <div style={{ fontSize: 14, fontWeight: 600, color: "#4a5568", marginTop: 8 }}>{label}</div>
        {sub && <div style={{ fontSize: 12, color: "#8896a8", marginTop: 4 }}>{sub}</div>}
      </div>
    );

    const StatusBadge = ({ status }) => {
      const colors = {
        live: { bg: "#e6f9ed", text: "#1a7a3a", label: "Live" },
        new: { bg: "#dbeafe", text: "#1e40af", label: "New" },
        ready: { bg: "#e8f0fe", text: FarrBlue, label: "Ready" },
        tested: { bg: "#e6f9ed", text: "#1a7a3a", label: "Tested" },
        done: { bg: "#e6f9ed", text: "#1a7a3a", label: "Done" },
        fixed: { bg: "#e6f9ed", text: "#1a7a3a", label: "Fixed" },
        pending: { bg: "#fff4e5", text: "#b45309", label: "Pending" },
        next: { bg: "#f3e8ff", text: "#7c3aed", label: "Next Up" },
        improved: { bg: "#dbeafe", text: "#1e40af", label: "Improved" },
      };
      const c = colors[status] || colors.ready;
      return (
        <span style={{
          display: "inline-block", padding: "3px 10px", borderRadius: 20,
          fontSize: 11, fontWeight: 600, letterSpacing: "0.03em", background: c.bg, color: c.text,
        }}>{c.label}</span>
      );
    };

    const Section = ({ title, children }) => (
      <div style={{ marginBottom: 32 }}>
        <h3 style={{
          fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em",
          color: FarrBronze, marginBottom: 16, paddingBottom: 8,
          borderBottom: `2px solid ${FarrBronze}33`,
        }}>{title}</h3>
        {children}
      </div>
    );

    const Row = ({ label, value, status }) => (
      <div style={{
        display: "flex", justifyContent: "space-between", alignItems: "center",
        padding: "10px 0", borderBottom: "1px solid #f0f2f5",

        <div style={{ flex: 1 }}>

                      <div style={{ flex: 1, height: 8, background: "#e8ecf2", borderRadius: 4, overflow: "hidden" }}>
                        <div style={{
                          width: `${d.pct}%`, height: "100%", borderRadius: 4,
                          background: d.pct >= 90 ? "#1a7a3a" : d.pct >= 70 ? FarrBlue : FarrOrange,
                        }} />
                      </div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#4a5568", width: 44, textAlign: "right" }}>{d.pct}%</div>
                      <div style={{ fontSize: 11, color: d.prev !== d.pct+"%" ? FarrOrange : "#8896a8", fontWeight: d.prev !== d.pct+"%" ? 600 : 400, width: 50 }}>
                        {d.prev !== d.pct+"%" && d.prev !== "new" ? `was ${d.prev}` : d.prev === "new" ? "new" : ""}
                      </div>
                    </div>
                  ))}

                <div style={{
                  background: "#fff", borderRadius: 12, padding: 20,
                  border: "1px solid #e8ecf2", marginBottom: 16,

                <Row label="View toggle" value="Grid thumbnails or compact list view" status="live" />
              </Section>

              <Section title="Portfolio Card Enhancements (Sprint 14)">
                <div style={{
                  background: "#fff", borderRadius: 12, padding: 20,
                  border: "1px solid #e8ecf2", marginBottom: 16,
                  fontSize: 13, color: "#4a5568", lineHeight: 1.7,
                }}>
                  You asked for &ldquo;Boat Type and then Class Name or Boat Name&rdquo; on thumbnails, and
                  &ldquo;overlay an icon or tag on the thumbnail.&rdquo; Done.
                </div>
                <Row label="Thumbnail titles" value="Now show Boat Type + Class/Boat Name" status="live" />

              <Section title="SEO & Discoverability (Sprint 13)">
                <FeatureCard
                  icon="&#128270;"
                  title="Google Can Now Find the Site"
                  desc="The site was previously blocking all search engines with noindex/nofollow tags and a restrictive robots.txt. All fixed."
                  items={[
                    "Removed noindex/nofollow from all pages",
                    "robots.txt now allows all crawlers",
                    "sitemap.xml generated with all 563 visible yacht pages",
                    "Open Graph tags on every page (link previews in iMessage, Slack, etc.)",
                    "JSON-LD structured data for Google rich results",

                />

            {/* ============ IMAGES & PERFORMANCE TAB ============ */}
            {activeTab === "images" && (<>
              <Section title="Image Coverage: 36% &rarr; 62%">
                <div style={{
                  background: "#fff", borderRadius: 12, padding: 20,
                  border: "1px solid #e8ecf2", marginBottom: 16,
                  fontSize: 13, color: "#4a5568", lineHeight: 1.7,
                }}>

                <Row label="Sprint 10" value="44 new images (MUSE + old site crawl)" status="done" />

                <Row label="Sprint 15" value="41 new images from old Drupal site (1,175 pages audited)" status="done" />
                <Row label="Total added" value="117 new images + 17 quality upgrades" status="done" />
